<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 160" width="560" height="160">
  <defs>
    <linearGradient id="arc-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="src-grad">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </radialGradient>
    <radialGradient id="tgt-grad">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="560" height="160" rx="16" fill="#0f172a"/>

  <!-- Source graph (left cluster) -->
  <line x1="42" y1="48" x2="62" y2="76" stroke="#4f46e5" stroke-width="1.2" opacity="0.5"/>
  <line x1="62" y1="76" x2="38" y2="103" stroke="#4f46e5" stroke-width="1.2" opacity="0.5"/>
  <line x1="42" y1="48" x2="78" y2="43" stroke="#4f46e5" stroke-width="1.2" opacity="0.5"/>
  <line x1="78" y1="43" x2="90" y2="70" stroke="#4f46e5" stroke-width="1.2" opacity="0.5"/>
  <line x1="62" y1="76" x2="90" y2="70" stroke="#4f46e5" stroke-width="1.2" opacity="0.5"/>
  <line x1="90" y1="70" x2="85" y2="106" stroke="#4f46e5" stroke-width="1.2" opacity="0.5"/>
  <line x1="38" y1="103" x2="85" y2="106" stroke="#4f46e5" stroke-width="1.2" opacity="0.5"/>
  <line x1="38" y1="103" x2="58" y2="123" stroke="#4f46e5" stroke-width="1.2" opacity="0.5"/>
  <line x1="58" y1="123" x2="85" y2="106" stroke="#4f46e5" stroke-width="1.2" opacity="0.5"/>
  <circle cx="42" cy="48" r="5" fill="url(#src-grad)"/>
  <circle cx="78" cy="43" r="4.5" fill="url(#src-grad)"/>
  <circle cx="62" cy="76" r="5.5" fill="url(#src-grad)"/>
  <circle cx="90" cy="70" r="4" fill="url(#src-grad)"/>
  <circle cx="38" cy="103" r="5" fill="url(#src-grad)"/>
  <circle cx="85" cy="106" r="4.5" fill="url(#src-grad)"/>
  <circle cx="58" cy="123" r="4" fill="url(#src-grad)"/>

  <!-- Transport arcs -->
  <path d="M 90,70 Q 145,18 200,53" stroke="url(#arc-grad)" stroke-width="2" fill="none" stroke-dasharray="6,3" opacity="0.9"/>
  <path d="M 85,106 Q 145,73 205,83" stroke="url(#arc-grad)" stroke-width="1.5" fill="none" stroke-dasharray="6,3" opacity="0.7"/>
  <path d="M 62,76 Q 140,48 210,68" stroke="url(#arc-grad)" stroke-width="1.5" fill="none" stroke-dasharray="6,3" opacity="0.6"/>
  <polygon points="198,52 205,50 200,57" fill="#f59e0b" opacity="0.9"/>
  <polygon points="203,82 210,80 205,87" fill="#f59e0b" opacity="0.7"/>
  <polygon points="208,67 215,65 210,72" fill="#f59e0b" opacity="0.6"/>

  <!-- Target graph (right cluster) -->
  <line x1="200" y1="53" x2="220" y2="38" stroke="#d97706" stroke-width="1.2" opacity="0.5"/>
  <line x1="220" y1="38" x2="240" y2="56" stroke="#d97706" stroke-width="1.2" opacity="0.5"/>
  <line x1="200" y1="53" x2="210" y2="68" stroke="#d97706" stroke-width="1.2" opacity="0.5"/>
  <line x1="210" y1="68" x2="240" y2="56" stroke="#d97706" stroke-width="1.2" opacity="0.5"/>
  <line x1="205" y1="83" x2="210" y2="68" stroke="#d97706" stroke-width="1.2" opacity="0.5"/>
  <line x1="205" y1="83" x2="230" y2="98" stroke="#d97706" stroke-width="1.2" opacity="0.5"/>
  <line x1="230" y1="98" x2="240" y2="56" stroke="#d97706" stroke-width="1.2" opacity="0.5"/>
  <line x1="230" y1="98" x2="215" y2="116" stroke="#d97706" stroke-width="1.2" opacity="0.5"/>
  <line x1="205" y1="83" x2="215" y2="116" stroke="#d97706" stroke-width="1.2" opacity="0.5"/>
  <circle cx="200" cy="53" r="5" fill="url(#tgt-grad)"/>
  <circle cx="220" cy="38" r="4" fill="url(#tgt-grad)"/>
  <circle cx="240" cy="56" r="4.5" fill="url(#tgt-grad)"/>
  <circle cx="210" cy="68" r="5" fill="url(#tgt-grad)"/>
  <circle cx="205" cy="83" r="5.5" fill="url(#tgt-grad)"/>
  <circle cx="230" cy="98" r="4" fill="url(#tgt-grad)"/>
  <circle cx="215" cy="116" r="4.5" fill="url(#tgt-grad)"/>

  <!-- Divider line -->
  <line x1="275" y1="30" x2="275" y2="130" stroke="#334155" stroke-width="1" opacity="0.5"/>

  <!-- Text -->
  <text x="300" y="75" font-family="'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="3">SGW</text>
  <text x="300" y="103" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#94a3b8" letter-spacing="1.8">SAMPLED GROMOV-WASSERSTEIN</text>
  <text x="300" y="123" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#64748b" letter-spacing="0.5">Scalable OT on graphs · Pure PyTorch</text>
</svg>
